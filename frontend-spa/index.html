<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Library Komik Digital - UAS Web 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased">

    <div id="app">
        <nav class="bg-rose-800 p-4 text-white shadow-lg sticky top-0 z-50">
            <div class="container mx-auto max-w-6xl flex justify-between items-center">
                
                <h1 class="text-xl font-extrabold tracking-wider flex items-center gap-2">
                    <span></span> <span>E-Library</span>
                </h1>
                
                <div class="space-x-4 font-semibold flex items-center text-sm">
                    <router-link to="/" class="hover:text-rose-200 transition py-1">Katalog</router-link>
                    
                    <router-link v-if="isLoggedIn" to="/dashboard" class="hover:text-rose-200 transition py-1">Dashboard Admin</router-link>
                    
                    <button v-if="isLoggedIn" @click="logout" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl transition shadow-md shadow-rose-900/20 font-bold">
                        Logout
                    </button>
                    
                    <router-link v-else to="/login" class="bg-white text-rose-800 hover:bg-rose-50 px-4 py-2 rounded-xl transition shadow-md font-bold">
                        Login Admin
                    </router-link>
                </div>

            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-6">
            <router-view></router-view>
        </main>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
